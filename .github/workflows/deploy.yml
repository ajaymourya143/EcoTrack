name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: cloud-run-source-repo1
  BACKEND_SERVICE: ecotrace-backend
  FRONTEND_SERVICE: ecotrace-frontend
  BACKEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-repo1/ecotrace-backend:${{ github.sha }}
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-repo1/ecotrace-frontend:${{ github.sha }}

jobs: 
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud using a Service Account JSON Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # 4. Build and Push Backend (FastAPI) Docker Image
      - name: Build Backend Image
        run: docker build -t ${{ env.BACKEND_IMAGE }} -f backend/Dockerfile backend

      - name: Push Backend Image to Artifact Registry
        run: docker push ${{ env.BACKEND_IMAGE }}

      # 5. Build and Push Frontend (Next.js) Docker Image
      - name: Build Frontend Image
        run: docker build -t ${{ env.FRONTEND_IMAGE }} -f frontend/Dockerfile frontend

      - name: Push Frontend Image to Artifact Registry
        run: docker push ${{ env.FRONTEND_IMAGE }}

      # 6. Deploy Backend to Cloud Run
      - name: Deploy Backend to Cloud Run 
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.BACKEND_IMAGE }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8000 \
            --set-env-vars HOST="0.0.0.0" \
            --set-env-vars GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      # 7. Deploy Frontend to Cloud Run
      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.FRONTEND_IMAGE }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}"
